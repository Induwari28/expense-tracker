<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. CSS VARIABLES & THEMES */
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333;
            --secondary-text: #777;
            --border-color: #ddd;
            --summary-bg: #f9f9f9;
            --item-bg: #eee;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #ffffff;
            --secondary-text: #bdc3c7;
            --border-color: #0f3460;
            --summary-bg: #1f2a44;
            --item-bg: #2d3436;
        }

        /* 2. BASE STYLES */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: 0.3s; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px; /* Default for mobile */
            margin: 0 auto;
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: max-width 0.4s ease;
        }

        h1 { margin: 0; font-size: 24px; }
        h3 { margin-top: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        /* 3. RESPONSIVE GRID SYSTEM */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 4. LAPTOP VIEW (HORIZONTAL) */
        @media (min-width: 1024px) {
            .container {
                max-width: 1100px; 
            }
            .dashboard-grid {
                flex-direction: row;
                align-items: flex-start;
            }
            .left-panel { flex: 1.4; }
            .right-panel { 
                flex: 1; 
                position: sticky; 
                top: 20px;
                background: var(--summary-bg);
                padding: 20px;
                border-radius: 10px;
            }
        }

        /* 5. UI COMPONENTS */
        .balance-summary { display: flex; justify-content: space-around; margin: 20px 0; padding: 15px; border-radius: 8px; background: var(--summary-bg); }
        .summary-box p { font-size: 20px; font-weight: bold; margin: 5px 0; }
        .plus-text { color: #2ecc71; }
        .minus-text { color: #e74c3c; }

        .chart-container { height: 300px; margin-bottom: 20px; }

        .goal-container { border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .progress-bg { background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        #progress-bar { background: #2ecc71; height: 100%; width: 0%; transition: width 0.5s; }

        .list { list-style: none; padding: 0; }
        .list li { 
            background: var(--container-bg); 
            border: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; 
            padding: 12px; margin-bottom: 10px; border-radius: 6px; 
        }
        .item-category { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: var(--item-bg); }

        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid var(--border-color); background: var(--container-bg); color: var(--text-color); box-sizing: border-box; }

        /* Buttons */
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        button { cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; border: none; }
        .goal-btn { background: #3498db; color: white; padding: 5px 10px; }
        .export-btn { background: #27ae60; color: white; padding: 8px 12px; flex: 1; }
        .reset-btn { background: #c0392b; color: white; padding: 8px 12px; flex: 1; }
        #theme-btn { background: var(--item-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 5px 10px; }
        .edit-btn { background: orange; color: white; padding: 2px 6px; margin-right: 5px; }
        .delete-btn { background: #e74c3c; color: white; padding: 2px 6px; }
        .save-btn { background: #2980b9; color: white; padding: 12px; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Expense Tracker</h1>
            <button onclick="toggleDarkMode()" id="theme-btn">🌙 Dark Mode</button>
        </div>

        <div style="text-align: right; margin-bottom: 15px;">
            <label style="font-size: 12px; font-weight: bold;">Currency: </label>
            <select id="currency-select" onchange="getTransactions()" style="width: auto; margin: 0;">
                <option value="$">$ (USD)</option>
                <option value="£">£ (GBP)</option>
                <option value="€">€ (EUR)</option>
                <option value="₹">₹ (INR)</option>
            </select>
        </div>

        <div class="dashboard-grid">
            
            <div class="left-panel">
                <div class="balance-container" style="text-align: center; margin-bottom: 25px;">
                    <h3 style="border:none;">Your Balance</h3>
                    <h1 id="balance" style="font-size: 42px;">$0.00</h1>
                </div>

                <div class="goal-container">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h4 style="margin: 0;">Savings Goal: <span id="goal-symbol">$</span><span id="goal-value">500</span></h4>
                        <button onclick="setGoal()" class="goal-btn">Set Goal</button>
                    </div>
                    <div class="progress-bg">
                        <div id="progress-bar"></div>
                    </div>
                    <p id="goal-status" style="font-size: 12px; color: var(--secondary-text); margin: 0;">0% reached</p>
                </div>

                <div class="balance-summary">
                    <div class="summary-box" style="text-align: center;">
                        <h4 style="margin:0; font-size:12px;">INCOME</h4>
                        <p id="income" class="plus-text">$0.00</p>
                    </div>
                    <div class="summary-box" style="text-align: center;">
                        <h4 style="margin:0; font-size:12px;">EXPENSE</h4>
                        <p id="expense" class="minus-text">$0.00</p>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>

                <div class="filter-container">
                    <label style="font-weight: bold; font-size: 14px;">Filter Month:</label>
                    <select id="month-filter" onchange="getTransactions()">
                        <option value="all">Full History</option>
                        <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                        <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                        <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                        <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                    </select>
                    <div class="btn-row">
                        <button onclick="exportToCSV()" class="export-btn">📥 Export CSV</button>
                        <button onclick="resetMonth()" class="reset-btn">🗑️ Reset Month</button>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <h3 style="margin-top:0;">Search</h3>
                <input type="text" id="search" placeholder="Search transactions..." onkeyup="filterTransactions()">

                <h3>History</h3>
                <ul id="list" class="list"></ul>

                <h3>Add New</h3>
                <form id="transaction-form">
                    <input type="text" id="desc" placeholder="Description" required />
                    <input type="number" id="amount" placeholder="Amount (Income +, Expense -)" required />
                    <select id="category">
                        <option value="Food">Food</option><option value="Rent">Rent</option>
                        <option value="Salary">Salary</option><option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option><option value="Other">Other</option>
                    </select>
                    <button class="save-btn">Save Transaction</button>
                </form>
            </div>

        </div> <button onclick="logout()" style="margin-top: 40px; background: none; color: var(--secondary-text); text-decoration: underline;">Logout</button>
    </div>

    <script>
        let myChart;
        const balanceEl = document.getElementById('balance');
        const incomeEl = document.getElementById('income');
        const expenseEl = document.getElementById('expense');
        const list = document.getElementById('list');
        const form = document.getElementById('transaction-form');
        const currencySelect = document.getElementById('currency-select');

        // --- THEME LOGIC ---
        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = "🌙 Dark Mode";
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ Light Mode";
                localStorage.setItem('theme', 'dark');
            }
        }

        // --- DATA FETCHING & UI UPDATE ---
        async function getTransactions() {
            try {
                const currency = currencySelect.value;
                document.getElementById('goal-symbol').innerText = currency;

                const res = await fetch('/api/transactions');
                let transactions = await res.json();
                
                const selectedMonth = document.getElementById('month-filter').value;
                if (selectedMonth !== 'all') {
                    transactions = transactions.filter(t => new Date(t.createdAt).getMonth() == selectedMonth);
                }
                
                list.innerHTML = '';
                let income = 0; let expense = 0;

                transactions.forEach(t => {
                    const item = document.createElement('li');
                    item.classList.add(t.amount < 0 ? 'minus' : 'plus');
                    const date = new Date(t.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                    item.innerHTML = `
                        <div>
                            <span style="font-weight:bold;">${t.text}</span>
                            <span class="item-category">${t.category || 'Other'}</span>
                            <small class="item-date" style="display:block; font-size:10px; color:gray;">${date}</small>
                        </div>
                        <div style="text-align:right;">
                            <span style="display:block; font-weight:bold;">${t.amount < 0 ? '-' : '+'}${currency}${Math.abs(t.amount).toFixed(2)}</span>
                            <button class="edit-btn" onclick="editItem('${t._id}', '${t.text}', ${t.amount}, '${t.category}')">Edit</button>
                            <button class="delete-btn" onclick="deleteItem('${t._id}')">X</button>
                        </div>
                    `;
                    list.appendChild(item);
                    if (t.amount > 0) income += t.amount; else expense += t.amount;
                });

                const totalBalance = income + expense;
                balanceEl.innerText = `${currency}${totalBalance.toFixed(2)}`;
                incomeEl.innerText = `${currency}${income.toFixed(2)}`;
                expenseEl.innerText = `${currency}${Math.abs(expense).toFixed(2)}`;

                updateProgressBar(totalBalance, currency);
                showChart(income, expense);
            } catch (err) { console.error(err); }
        }

        // --- FEATURES: GOAL, EXPORT, RESET ---
        function updateProgressBar(currentBalance, currency) {
            const goalValue = parseFloat(document.getElementById('goal-value').innerText);
            const progressBar = document.getElementById('progress-bar');
            let percentage = Math.min((currentBalance / goalValue) * 100, 100);
            if (percentage < 0) percentage = 0;
            progressBar.style.width = percentage + "%";
            document.getElementById('goal-status').innerText = `${Math.round(percentage)}% reached (${currency}${currentBalance.toFixed(2)} / ${currency}${goalValue})`;
        }

        async function exportToCSV() {
            const res = await fetch('/api/transactions');
            const data = await res.json();
            let csv = "Date,Text,Category,Amount\n";
            data.forEach(t => csv += `${new Date(t.createdAt).toLocaleDateString()},"${t.text}",${t.category},${t.amount}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'report.csv'; a.click();
        }

        async function resetMonth() {
            const month = document.getElementById('month-filter').value;
            if (month === 'all') return alert("Select a specific month.");
            if (confirm("Delete all data for this month?")) {
                await fetch(`/api/transactions/reset/${month}`, { method: 'DELETE' });
                getTransactions();
            }
        }

        function setGoal() {
            const val = prompt("Enter target goal:");
            if (val) { document.getElementById('goal-value').innerText = val; getTransactions(); }
        }

        // --- CRUD & SEARCH ---
        function filterTransactions() {
            const filter = document.getElementById('search').value.toLowerCase();
            Array.from(list.getElementsByTagName('li')).forEach(item => {
                const name = item.querySelector('span').textContent.toLowerCase();
                item.style.display = name.includes(filter) ? 'flex' : 'none';
            });
        }

        async function deleteItem(id, confirmMsg = true) {
            if (confirmMsg && !confirm('Delete?')) return;
            await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
            getTransactions();
        }

        function editItem(id, text, amount, category) {
            document.getElementById('desc').value = text;
            document.getElementById('amount').value = amount;
            document.getElementById('category').value = category;
            deleteItem(id, false);
            document.getElementById('desc').focus();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/api/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    text: document.getElementById('desc').value, 
                    amount: Number(document.getElementById('amount').value),
                    category: document.getElementById('category').value 
                })
            });
            form.reset(); getTransactions();
        });

        function showChart(inc, exp) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar', data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{ data: [inc, Math.abs(exp)], backgroundColor: ['#2ecc71', '#e74c3c'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function logout() { window.location.href = 'login.html'; }

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('theme-btn').innerText = "☀️ Light Mode";
            }
            getTransactions();
        };
    </script>
</body>
</html>
