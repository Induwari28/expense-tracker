<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. CSS VARIABLES FOR THEME SWITCHING */
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333;
            --secondary-text: #777;
            --border-color: #ddd;
            --summary-bg: #f9f9f9;
            --item-bg: #eee;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #ffffff;
            --secondary-text: #bdc3c7;
            --border-color: #0f3460;
            --summary-bg: #1f2a44;
            --item-bg: #2d3436;
        }

        /* 2. APPLYING VARIABLES */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: background-color 0.3s, color 0.3s; 
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        .filter-container, .goal-container, .chart-container {
            background-color: var(--container-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color);
        }

        .balance-summary {
            background-color: var(--summary-bg) !important;
        }

        .summary-box h4 { color: var(--secondary-text); }
        .item-category { background: var(--item-bg); color: var(--text-color); }
        .item-date { color: var(--secondary-text); }

        input, select { 
            background: var(--container-bg); 
            color: var(--text-color); 
            border: 1px solid var(--border-color); 
        }

        /* Existing Button Styles */
        .item-category { border-radius: 10px; padding: 2px 8px; font-size: 10px; text-transform: uppercase; margin-left: 10px; font-weight: bold; }
        .delete-btn { cursor: pointer; background-color: #e74c3c; border: 0; color: #fff; padding: 2px 8px; border-radius: 3px; margin-left: 5px; }
        .edit-btn { cursor: pointer; background-color: orange; border: 0; color: #fff; padding: 2px 8px; border-radius: 3px; }
        .chart-container { position: relative; height: 250px; width: 100%; margin-bottom: 30px; padding: 10px; border-radius: 8px; }
        .balance-summary { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 10px; border-radius: 8px; }
        .summary-box p { margin: 5px 0 0; font-size: 18px; font-weight: bold; }
        .plus-text { color: #2ecc71; }
        .minus-text { color: #e74c3c; }
        
        .goal-btn { padding: 2px 8px; font-size: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .reset-btn { background-color: #c0392b; color: white; border: none; padding: 8px 12px; font-size: 11px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .export-btn { background-color: #27ae60; color: white; border: none; padding: 8px 12px; font-size: 11px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Theme Toggle Button Style */
        #theme-btn {
            background: var(--summary-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            cursor: pointer;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Expense Tracker</h1>
            <button onclick="toggleDarkMode()" id="theme-btn">🌙 Dark Mode</button>
        </div>

        <div class="currency-container" style="text-align: right; margin-bottom: 10px;">
            <label style="font-size: 12px; font-weight: bold;">Currency: </label>
            <select id="currency-select" onchange="getTransactions()" style="width: auto; padding: 5px;">
                <option value="$">$ (USD)</option>
                <option value="£">£ (GBP)</option>
                <option value="€">€ (EUR)</option>
                <option value="₹">₹ (INR)</option>
            </select>
        </div>

        <div class="balance-container">
            <h3>Your Balance</h3>
            <h1 id="balance">$0.00</h1>
        </div>

        <div class="goal-container" style="padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h4 style="margin: 0;">Savings Goal: <span id="goal-symbol">$</span><span id="goal-value">500</span></h4>
                <button onclick="setGoal()" class="goal-btn">Set Goal</button>
            </div>
            
            <div class="progress-bg" style="background: #eee; height: 20px; border-radius: 10px; margin-top: 10px; overflow: hidden;">
                <div id="progress-bar" style="background: #2ecc71; height: 100%; width: 0%; transition: width 0.5s ease;"></div>
            </div>
            <p id="goal-status" style="font-size: 12px; margin-top: 5px;">0% of your goal reached</p>
        </div>
        
        <div class="balance-summary">
            <div class="summary-box">
                <h4>INCOME</h4>
                <p id="income" class="plus-text">$0.00</p>
            </div>
            <div class="summary-box">
                <h4>EXPENSE</h4>
                <p id="expense" class="minus-text">$0.00</p>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div class="filter-container" style="display: flex; gap: 10px; align-items: center; padding: 10px; border-radius: 8px;">
            <label style="font-weight: bold;">View Month:</label>
            <select id="month-filter" onchange="getTransactions()" style="width: auto; margin-bottom: 0; padding: 5px;">
                <option value="all">Full History</option>
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
            </select>

            <button onclick="exportToCSV()" class="export-btn">📥 Export CSV</button>
            <button onclick="resetMonth()" class="reset-btn">🗑️ Reset Month</button>
        </div>

        <h3>Search</h3>
        <input type="text" id="search" placeholder="Search by name..." onkeyup="filterTransactions()">

        <h3>History</h3>
        <ul id="list" class="list"></ul>

        <h3>Add New Transaction</h3>
        <form id="transaction-form">
            <input type="text" id="desc" placeholder="Description" required />
            <input type="number" id="amount" placeholder="Amount (Income +, Expense -)" required />
            
            <label for="category">Category</label>
            <select id="category">
                <option value="Food">Food</option>
                <option value="Rent">Rent</option>
                <option value="Salary">Salary</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>

            <button class="btn">Save Transaction</button>
        </form>

        <button onclick="logout()" style="margin-top: 30px; background-color: #bbbbbb; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Logout</button>
    </div>

    <script>
        let myChart;
        const balanceEl = document.getElementById('balance');
        const incomeEl = document.getElementById('income');
        const expenseEl = document.getElementById('expense');
        const list = document.getElementById('list');
        const form = document.getElementById('transaction-form');
        const descInp = document.getElementById('desc');
        const amountInp = document.getElementById('amount');
        const categoryInp = document.getElementById('category');
        const currencySelect = document.getElementById('currency-select');
        const goalSymbol = document.getElementById('goal-symbol');

        // --- DARK MODE LOGIC ---
        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = "🌙 Dark Mode";
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ Light Mode";
                localStorage.setItem('theme', 'dark');
            }
        }

        async function getTransactions() {
            try {
                const currency = currencySelect.value;
                goalSymbol.innerText = currency;

                const res = await fetch('/api/transactions');
                let transactions = await res.json();
                
                const selectedMonth = document.getElementById('month-filter').value;
                if (selectedMonth !== 'all') {
                    transactions = transactions.filter(t => new Date(t.createdAt).getMonth() == selectedMonth);
                }
                
                list.innerHTML = '';
                let income = 0;
                let expense = 0;

                transactions.forEach(t => {
                    const item = document.createElement('li');
                    item.classList.add(t.amount < 0 ? 'minus' : 'plus');
                    const date = new Date(t.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                    item.innerHTML = `
                        <div>
                            <span class="item-name" style="font-weight:bold;">${t.text}</span>
                            <span class="item-category" data-category="${t.category}">${t.category || 'Other'}</span>
                            <small class="item-date">${date}</small>
                        </div>
                        <div>
                            <span>${t.amount < 0 ? '-' : '+'}${currency}${Math.abs(t.amount).toFixed(2)}</span>
                            <button class="edit-btn" onclick="editItem('${t._id}', '${t.text}', ${t.amount}, '${t.category}')">Edit</button>
                            <button class="delete-btn" onclick="deleteItem('${t._id}')">X</button>
                        </div>
                    `;
                    list.appendChild(item);

                    if (t.amount > 0) income += t.amount;
                    else expense += t.amount;
                });

                const totalBalance = income + expense;
                balanceEl.innerText = `${currency}${totalBalance.toFixed(2)}`;
                incomeEl.innerText = `${currency}${income.toFixed(2)}`;
                expenseEl.innerText = `${currency}${Math.abs(expense).toFixed(2)}`;

                updateProgressBar(totalBalance, currency);
                showChart(income, expense);
            } catch (err) { console.error(err); }
        }

        async function exportToCSV() {
            try {
                const res = await fetch('/api/transactions');
                let transactions = await res.json();
                const selectedMonth = document.getElementById('month-filter').value;
                if (selectedMonth !== 'all') {
                    transactions = transactions.filter(t => new Date(t.createdAt).getMonth() == selectedMonth);
                }
                if (transactions.length === 0) { alert("No data to export."); return; }

                let csvContent = "Date,Description,Category,Amount\n";
                transactions.forEach(t => {
                    csvContent += `${new Date(t.createdAt).toLocaleDateString()},"${t.text}",${t.category},${t.amount}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `report_${selectedMonth}.csv`;
                a.click();
            } catch (err) { console.error(err); }
        }

        async function resetMonth() {
            const selectedMonth = document.getElementById('month-filter').value;
            if (selectedMonth === 'all') { alert("Select a month first."); return; }
            if (confirm("Delete ALL transactions for this month?")) {
                await fetch(`/api/transactions/reset/${selectedMonth}`, { method: 'DELETE' });
                getTransactions();
            }
        }

        function setGoal() {
            const newGoal = prompt("New goal amount:", "500");
            if (newGoal) { document.getElementById('goal-value').innerText = newGoal; getTransactions(); }
        }

        function updateProgressBar(currentBalance, currency) {
            const goalValue = parseFloat(document.getElementById('goal-value').innerText);
            const progressBar = document.getElementById('progress-bar');
            let percentage = Math.min((currentBalance / goalValue) * 100, 100);
            if (percentage < 0) percentage = 0;
            progressBar.style.width = percentage + "%";
            document.getElementById('goal-status').innerText = `${Math.round(percentage)}% reached (${currency}${currentBalance.toFixed(2)} / ${currency}${goalValue})`;
        }

        function editItem(id, text, amount, category) {
            descInp.value = text; amountInp.value = amount; categoryInp.value = category;
            deleteItem(id, false); descInp.focus();
        }

        async function deleteItem(id, confirmMsg = true) {
            if (confirmMsg && !confirm('Delete?')) return;
            await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
            getTransactions();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/api/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: descInp.value, amount: Number(amountInp.value), category: categoryInp.value })
            });
            descInp.value = ''; amountInp.value = ''; getTransactions();
        });

        function showChart(inc, exp) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar', 
                data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{
                        label: 'Amount',
                        data: [inc, Math.abs(exp)],
                        backgroundColor: ['#2ecc71', '#e74c3c']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function filterTransactions() {
            const filter = document.getElementById('search').value.toLowerCase();
            Array.from(list.getElementsByTagName('li')).forEach(item => {
                const name = item.querySelector('.item-name').textContent.toLowerCase();
                item.style.display = name.includes(filter) ? 'flex' : 'none';
            });
        }

        function logout() { window.location.href = 'login.html'; }

        // --- INITIALIZATION ---
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('theme-btn').innerText = "☀️ Light Mode";
            }
            getTransactions();
        };
    </script>
</body>
</html>
